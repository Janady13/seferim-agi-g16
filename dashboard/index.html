<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEFERIM Dashboard v4</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%A0%3C/text%3E%3C/svg%3E" />
    <style>
      * { box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #080a10;
        color: #e6f1ff;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      }
      :root {
        --grid-gap: 16px;
        --color-primary: #6366f1;
        --color-success: #22c55e;
        --color-error: #ef4444;
        --color-warning: #f59e0b;
        --color-bg-primary: #080a10;
        --color-bg-secondary: #0e1320;
        --color-border: #1c2540;
        --color-text-primary: #e6f1ff;
        --color-text-secondary: #94a3b8;
        --color-text-muted: #64748b;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--color-bg-secondary); }
      ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #2d3a5c; }
      button { cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
      button:hover { opacity: 0.9; }
      button:active { transform: scale(0.98); }
      select { cursor: pointer; }
      @media (max-width: 1200px) {
        :root { --grid-gap: 12px; }
      }
      @media (max-width: 768px) {
        :root { --grid-gap: 8px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
